# Application specific deployment configuration
deployment:
  replicaCount: 1
  image:
    repository: 637423436902.dkr.ecr.ap-southeast-1.amazonaws.com/isg-omcom/lf-images/lf-cep-prioritizer
    tag: master-2025-06-11-0839-a2f2fa7
    pullPolicy: IfNotPresent
  env:
    - name: JAVA_OPTS
      value: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/dump"
    - name: APP_NAME
      value: "isg-omcom-lf-cep-prioritizer"
    - name: CONFIG_FILE
      value: "/app/application.conf"
    - name: LAUNCHER_CONFIG_FILE
      value: "/launcher-config.yaml"

applications:
  isg-omcom-lf-cep-prioritizer:
    config:
      akka:
        loglevel: INFO
        stdout-loglevel: INFO
      http:
        port: 8080
        host: "0.0.0.0"
      dependencies:
        cassandra:
          host: "cassandra"
          port: 9042
    launcher_config:
      jvm_options: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/dump"
      memory:
        min: 512m
        max: 1g
    static_jobs:
      jobs: []
