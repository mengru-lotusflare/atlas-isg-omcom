{{- range $chartName, $chart := .Subcharts }}
{{- $appName := $chartName | replace "isg-omcom-cassandra-scala-services-" "" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $appName }}
  labels:
    app.kubernetes.io/name: {{ $appName }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app: {{ $appName }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  application_config.json: |
    {{- merge .Values.config $chart.Values.config | toPrettyJson | nindent 4 }}

  static_jobs.json: |
    {{- $filteredJobs := dict }}
    {{- range $jobName, $jobConfig := .Values.jobs }}
      {{- if hasKey $jobConfig "enabled" }}
        {{- if eq (toString $jobConfig.enabled) "true" }}
          {{- $_ := set $filteredJobs $jobName $jobConfig }}
        {{- end }}
      {{- else }}
          {{- $_ := set $filteredJobs $jobName $jobConfig }}
      {{- end }}
    {{- end }}
    {{- dict "jobs" $filteredJobs | toPrettyJson | nindent 4 }}

  launcher_config.yaml: |
    AppConf: /app/application.conf
    DumpPath: /dump
    Jar: /usr/share/java/{{ .Values.overrides.jarName | default .Values.name }}.jar
    JvmOpts:
      - "-XX:+ExitOnOutOfMemoryError"
      - "-XX:+HeapDumpOnOutOfMemoryError"
      {{- if .Values.launcher_config.RAMPercentage }}
      - "-XX:InitialRAMPercentage={{ .Values.launcher_config.RAMPercentage | float64 | printf "%.1f" }}"
      - "-XX:MinRAMPercentage={{ .Values.launcher_config.RAMPercentage | float64 | printf "%.1f" }}"
      - "-XX:MaxRAMPercentage={{ .Values.launcher_config.RAMPercentage | float64 | printf "%.1f" }}"
      {{- else }}
      - "-Xms{{ .Values.launcher_config.Xms }}"
      - "-Xmx{{ .Values.launcher_config.Xmx }}"
      {{- end }}
      - "-Djava.rmi.server.hostname=127.0.0.1" # Requires kubectl port-forward access to pod
      - "-Dcom.sun.management.jmxremote.authenticate=false"
      - "-Dcom.sun.management.jmxremote.ssl=false"
      - "-Dcom.sun.management.jmxremote.port={{ .Values.launcher_config.jmxremote_port }}"
      - "-Dcom.sun.management.jmxremote.rmi.port={{ .Values.launcher_config.jmxremote_port }}"
      - "-Dscala.concurrent.context.numThreads=4"
      - "-Dscala.concurrent.context.minThreads=2"
      - "-Dscala.concurrent.context.maxThreads=4"
      - "-Dfile.encoding=UTF8"
      - "-Dconfig.override_with_env_vars=true"
      - "-Dcom.datastax.driver.FORCE_NIO=true"
      {{- range $jvmOption := .Values.launcher_config.jvm_options }}
      - {{ $jvmOption | quote }}
      {{- end }}
    Logback: /app/logback.xml
    Name: {{ $appName }}
{{- end }}
